<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Intro Search</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="login-header">
                <h1>Community Search</h1>
                <p>Enter password to access</p>
            </div>
            <form id="login-form">
                <input type="password" id="password" placeholder="Password" required autocomplete="off">
                <button type="submit">Enter</button>
            </form>
            <p id="login-error" class="error hidden">Incorrect password</p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="screen hidden">
        <header>
            <div class="header-content">
                <h1>Community Intro Search</h1>
                <button id="logout-btn" class="secondary">Logout</button>
            </div>
        </header>

        <main>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search posts by topic or keyword...">
                    <button id="search-btn">Search</button>
                </div>

                <div class="filters">
                    <select id="filter-city">
                        <option value="">All Cities</option>
                    </select>
                    <select id="filter-country">
                        <option value="">All Countries</option>
                    </select>
                    <select id="filter-region">
                        <option value="">All Regions</option>
                    </select>
                    <label>
                        Results:
                        <input type="number" id="n-results" value="10" min="1" max="50">
                    </label>
                </div>
            </div>

            <div id="results-container">
                <p class="placeholder">Enter a search term to find community members</p>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Searching...</p>
            </div>

            <div id="error-message" class="error hidden"></div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
